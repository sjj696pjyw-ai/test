meta:
  name: price-monitor
  description: Сервис анализа цен конкурентов в Яндексе

frontend:
  type: static
  path: frontend/dist
  buildCommand: cd frontend && npm install && npm run build
  outputPath: frontend/dist

backend:
  type: python
  path: backend
  runCommand: gunicorn --bind 0.0.0.0:5000 --workers 2 main:app
  port: 5000
  dependencies:
    - python:3.11
    - packages:
        - gcc
        - libpq-dev
